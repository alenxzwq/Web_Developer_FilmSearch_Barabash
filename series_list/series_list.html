<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Что сегодня посмотреть?</title>

    <link rel="stylesheet" href="/style/common.css" />
    <link rel="stylesheet" href="/style/font.css" />
    <link rel="stylesheet" href="/style/colors.css" />
    <link rel="stylesheet" href="/style/list.css" />
  </head>
  <body>
    <!------------------------- шапка --------------------------->
    <header>
      <a href="/index.html"
        ><img class="header_logo" src="/assets/icons/logo.svg"
      /></a>
      <nav class="header_navigation">
        <ul class="header_list">
          <li class="header_list_point">
            <a href="/movie_list/movie_list.html">Фильмы</a>
          </li>
          <li class="header_list_point">
            <a href="/series_list/series_list.html">Сериалы</a>
          </li>
        </ul>
      </nav>
      <div class="switch_theme active_header">
        <p id="toggleText">Тёмная тема</p>
        <button id="toggleBtn">
          <img
            class="switch_theme_icon light-toggle"
            src="/assets/icons/switch_light.svg"
          />
          <img
            class="switch_theme_icon dark-toggle"
            src="/assets/icons/switch_dark.svg"
          />
        </button>
      </div>

      <img class="header_burger" id="burger" src="/assets/icons/burger.svg" />
    </header>
    <!------------------------------------------------------------------->

    <!------------------------- боковое меню --------------------------->
    <div class="sidebar" id="sidebar">
      <img
        class="sidebar_close"
        id="close"
        src="/assets/icons/close_black.svg"
      />
      <nav class="sidebar_navigation">
        <ul class="sidebar_list">
          <li class="sidebar_list_point">
            <a href="/movie_list/movie_list.html">Фильмы</a>
          </li>
          <li class="sidebar_list_point active_header">
            <a href="/series_list/series_list.html">Сериалы</a>
          </li>
        </ul>
      </nav>

      <div class="sidebar_theme">
        <p>Тёмная тема</p>
        <button id="toggleBtnMobile">
          <img
            class="sidebar_theme_icon light-toggle"
            src="/assets/icons/switch_light.svg"
          />
          <img
            class="sidebar_theme_icon dark-toggle"
            src="/assets/icons/switch_dark.svg"
          />
        </button>
      </div>
    </div>
    <!------------------------------------------------------------------->

    <!------------------------- поиск --------------------------->
    <section class="search">
      <div class="search_container">
        <div class="search_icon">
          <img src="/assets/icons/search.svg" alt="Search" />
        </div>
        <input
          class="search-input"
          type="text"
          placeholder="Что сегодня посмотреть?"
        />
        <button class="search_btn">Найти</button>
      </div>
    </section>
    <!------------------------------------------------------------------->

    <!------------------------- секция списков сериалов --------------------------->
    <section class="movies_page">
      <!------------------------- боковое меню фильтрации --------------------------->
      <aside class="sidebarFilter">
        <div class="sidebar_filters">
          <h1 class="sidebar_heading">Сериалы</h1>
          <div class="filter_group">
            <label>Жанр</label>
            <div class="select_container">
              <select id="genreFilter" class="style_select">
                <option value="">Все жанры</option>
                <option value="боевик">Боевик</option>
                <option value="комедия">Комедия</option>
                <option value="драма">Драма</option>
                <option value="фантастика">Фантастика</option>
                <option value="триллер">Триллер</option>
                <option value="ужасы">Ужасы</option>
              </select>
              <img
                class="select_arrow"
                src="/assets/icons/selected_arrow.svg"
              />
            </div>
          </div>

          <div class="filter_group">
            <label>Рейтинг</label>
            <div class="select_container">
              <select id="ratingFilter" class="style_select">
                <option value="">Выбрать рейтинг</option>
                <option value="9">От 9</option>
                <option value="8">От 8</option>
                <option value="7">От 7</option>
                <option value="6">От 6</option>
              </select>
              <img
                class="select_arrow"
                src="/assets/icons/selected_arrow.svg"
              />
            </div>
          </div>

          <div class="filter_group">
            <label>Страна</label>
            <div class="select_container">
              <select id="countryFilter" class="style_select">
                <option value="">Все страны</option>
                <option value="США">США</option>
                <option value="Россия">Россия</option>
                <option value="Великобритания">Великобритания</option>
                <option value="Франция">Франция</option>
                <option value="Япония">Япония</option>
              </select>
              <img
                class="select_arrow"
                src="/assets/icons/selected_arrow.svg"
              />
            </div>
          </div>

          <div class="filter_group">
            <label>Год выпуска</label>
            <div class="select_container">
              <select id="yearFilter" class="style_select">
                <option value="">Все годы</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
                <option value="2019">2019</option>
                <option value="2018">2018</option>
                <option value="2017">2017</option>
              </select>
              <img
                class="select_arrow"
                src="/assets/icons/selected_arrow.svg"
              />
            </div>
          </div>
        </div>
      </aside>
      <!------------------------------------------------------------------->

      <!------------------------- основной контент страницы --------------------------->
      <main class="main-content">
        <div class="content_header">
          <h1>Сериалы</h1>

          <div class="pages">
            <span class="active">1</span>
            <span>2</span>
            <span>3</span>
            <span>4</span>
            <span>5</span>
          </div>
        </div>
        <!------------------------- сетка фильмов --------------------------->
        <div class="movies_grid">
          <div class="style_card">
            <div class="style_card_ratting"><p>9.8</p></div>
            <div class="style_card_name"><p>Проклятое королевство</p></div>
            <img src="/assets/gallery/poster_1.png" />
          </div>
        </div>

        <!------------------------- список сериалов для мобильных устройств --------------------------->
        <section class="gallery slider_list">
          <div class="slider_wrapper">
            <div class="slider_track">
              <div class="style_card">
                <div class="style_card_ratting"><p>9.8</p></div>
                <div class="style_card_name"><p>Проклятое королевство</p></div>
                <img src="/assets/gallery/poster_1.png" />
              </div>
            </div>
          </div>
          <button class="slider-btn prev-btn">
            <img src="/assets/icons/arrow_slider_active.svg" />
          </button>
          <button class="slider-btn next-btn">
            <img src="/assets/icons/arrow_slider_active.svg" />
          </button>
        </section>
      </main>
      <!------------------------------------------------------------------->
    </section>

    </footer>

  </body>

  <script src="/script/scripts.js"></script>

</html>
